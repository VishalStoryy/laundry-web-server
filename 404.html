<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body class="bg-gray-50 font-sans flex items-center justify-center min-h-screen">
    <div class="text-center">
        <h1 class="text-[150px] font-bold text-teal-300 leading-none">404</h1>
        <h2 class="text-4xl font-semibold text-gray-800 mb-6">Oops! Page not found</h2>
        <p class="text-xl text-gray-600 mb-10">The page you're looking for doesn't exist.</p>
        <a href="/home" 
           class="inline-block bg-teal-600 text-white px-10 py-4 rounded-full text-xl hover:bg-teal-700">
            ← Back to Home
        </a>
    </div>
</body>
</html>
