<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanWave - Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">
   
    <nav class="bg-teal-600 text-white sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-3xl font-bold flex items-center gap-2">
                <i class="fas fa-tshirt"></i> CleanWave
            </h1>
            <div class="flex gap-8 text-lg">
                <a href="/home" class="hover:underline">Home</a>
                <a href="/services" class="hover:underline">Services</a>
                <a href="/about" class="hover:underline">About</a>
                <a href="/contact" class="hover:underline">Contact</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6 py-16 grid md:grid-cols-2 gap-16">
        <div>
            <h2 class="text-5xl font-bold mb-8">Get in Touch</h2>
            <form class="space-y-6">
                <input type="text" placeholder="Your Name" class="w-full p-5 border rounded-2xl text-lg">
                <input type="email" placeholder="Email Address" class="w-full p-5 border rounded-2xl text-lg">
                <textarea placeholder="Your Message" rows="6" class="w-full p-5 border rounded-2xl text-lg"></textarea>
                <button type="button" 
                        class="w-full bg-teal-600 hover:bg-teal-700 text-white py-5 rounded-2xl text-xl font-semibold">
                    Send Message
                </button>
            </form>
        </div>

        <div class="space-y-8">
            <div class="flex gap-4">
                <i class="fas fa-map-marker-alt text-4xl text-teal-500"></i>
                <div>
                    <h4 class="font-semibold text-xl">Meerut, India</h4>
                    <p class="text-gray-600">Partapur - Lisari road -250103</p>
                </div>
            </div>
            <div class="flex gap-4">
                <i class="fas fa-phone text-4xl text-teal-500"></i>
                <div>
                    <h4 class="font-semibold text-xl">+91 98765 43210</h4>
                    <p class="text-gray-600">Mon-Sun | 8 AM - 8 PM</p>
                </div>
            </div>
            <div class="flex gap-4">
                <i class="fas fa-envelope text-4xl text-teal-500"></i>
                <div>
                    <h4 class="font-semibold text-xl">vishalsroryy@gmail.com</h4>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-gray-900 text-white py-12 text-center">
        <p>&copy; 2026 CleanWave Laundry • Made for Assignment</p>
    </footer>
</body>
</html>
